<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ERTE5 Scoreboard Pro</title>

    <meta name="description"
          content="ERTE5 Digital Scoreboard Professional">

    <link rel="icon"
          href="assets/logo.png">

    <link rel="stylesheet"
          href="css/index.css">

</head>

<body>

    <div class="background"></div>

    <main class="container">

        <div class="card">

            <img src="assets/logo.png"
                 alt="ERTE5 Logo"
                 class="logo">

            <h1>

                ERTE5

            </h1>

            <h2>

                DIGITAL SCOREBOARD

            </h2>

            <p>

                Professional Tournament Edition

            </p>

            <div class="menu">

                <button
                    id="btnOperator"
                    class="primary">

                    MODE OPERATOR

                </button>

                <button
                    id="btnDisplay"
                    class="secondary">

                    MODE DISPLAY

                </button>

                <button
                    id="btnFullscreen"
                    class="secondary">

                    DISPLAY FULLSCREEN

                </button>

                <button
                    id="btnAbout"
                    class="ghost">

                    ABOUT

                </button>

            </div>

            <div class="footer">

                <span>

                    Version 1.0

                </span>

            </div>

        </div>

    </main>

    <script src="js/index.js"></script>

</body>

</html>
